name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-and-deploy:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.3")
          CURRENT="${LATEST_TAG#v}"
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s" -10)

          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.*\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "No version bump needed"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $BUMP: $CURRENT -> $NEW_VERSION"

      - name: Update version files
        if: steps.bump.outputs.bump != 'none'
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          # frontend/src/version.ts
          echo "export const APP_VERSION = \"$VERSION\";" > frontend/src/version.ts

          # frontend/public/version.json
          echo "{\"version\":\"$VERSION\"}" > frontend/public/version.json

          # desktop/preload.js
          sed -i "s/version: \".*\"/version: \"$VERSION\"/" desktop/preload.js

          # desktop/package.json
          cd desktop && npm version "$VERSION" --no-git-tag-version

      - name: Commit version bump
        if: steps.bump.outputs.bump != 'none'
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/version.ts frontend/public/version.json desktop/preload.js desktop/package.json
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git tag -f "v${VERSION}"
          git push origin main --tags --force

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config fly.toml --remote-only
