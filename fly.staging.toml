app = "saleflow-staging"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_HOST = "saleflow-staging.fly.dev"
  PHX_SERVER = "true"
  PORT = "4000"
  MIX_ENV = "prod"
  POOL_SIZE = "5"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
